<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="main.css">
    <script src="main.js" defer></script>
</head>

<body class="login-body-fix">

    <div class="navbar-container">

        <nav class="navbar navbar-expand-md m-2">

            <div class="container-fluid">

                <a class="navbar-brand ms-1" href="index.html">
                    <img src="./images/logo3-removebg-preview.png" alt="Logo" class="logo-navbar" style="height:48px;">
                </a>

                <div class="ms-auto">
                    <a class="nav-link fw-normal" href="index.html"> Torna alla Homepage </a>
                </div>

            </div>
        </nav>
    </div>

    <div class="login-overlay">

        <div class="login-card">

            <h2 class="fw-bold titolo mb-4"> LOGIN </h2>

            <form id="loginForm">

                <div class="mb-3">
                    <label class="titolettino mb-2 d-block">Username</label>
                    <input type="text" id="username" class="form-control login-input" placeholder="" required>
                </div>

                <div class="mb-3">
                    <label class="titolettino mb-2 d-block">Email</label>
                    <input type="email" id="email" class="form-control login-input" placeholder="" required>
                </div>

                <div class="mb-4">
                    <label class="titolettino mb-2 d-block">Password</label>
                    <input type="password" id="password" class="form-control login-input" placeholder="" required>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit-style fw-bold">ACCEDI</button>

                <p id="msg-conferma" class="mt-3 text-center" style="display:none; color: #00ff00;"></p>

            </form>

        </div>
    </div>

</body>

</html>
